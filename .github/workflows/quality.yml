name: Quality Gates

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Linux GUI test dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Quote the editable extras expression so bash does not interpret the brackets.
          python -m pip install -e ".[dev]"
          # Install pytest-cov explicitly as a belt-and-braces guard for CI environments
          # where extras resolution is unexpectedly incomplete.
          python -m pip install pytest-cov

      - name: Validate toolchain
        run: |
          python --version
          python -m pytest --version
          python -m ruff --version
          python -m mypy --version
          python -c "import coverage, pytest_cov; print('coverage', coverage.__version__); print('pytest-cov', pytest_cov.__version__)"
      - name: Lint
        run: python -m ruff check .

      - name: Type-check
        run: python -m mypy

      - name: Compile sanity check
        run: python -m compileall .

      - name: Provider contract tests
        run: python -m pytest tests/test_provider_contracts.py -v

      - name: Full test suite
        run: xvfb-run -a python -m pytest -v

      - name: Coverage gate
        run: xvfb-run -a python coverage_report.py --results-dir results/coverage_report --top-files 25 --fail-under 99.5

      - name: Benchmark regression smoke
        run: python benchmark_report.py --fail-on-regression

      - name: Upload coverage and benchmark artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-artifacts
          if-no-files-found: warn
          path: |
            results/coverage_report
            results/benchmark_report
