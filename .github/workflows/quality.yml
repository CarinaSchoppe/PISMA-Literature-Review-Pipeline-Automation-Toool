name: Quality Gates

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Lint
        run: python -m ruff check .

      - name: Type-check
        run: python -m mypy

      - name: Provider contract tests
        run: python -m pytest tests/test_provider_contracts.py -v

      - name: Full test suite
        run: python -m pytest -v

      - name: Coverage gate
        run: python coverage_report.py --results-dir results/coverage_report --top-files 25 --fail-under 99.5

      - name: Benchmark regression smoke
        run: python benchmark_report.py --fail-on-regression

      - name: Upload coverage and benchmark artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-artifacts
          path: |
            results/coverage_report
            results/benchmark_report
